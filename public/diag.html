<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase Diagnostic</title>
  <style>
    body { font-family: monospace; background: #0f0f1a; color: #cdd6f4; padding: 20px; margin: 0; }
    h1 { color: #cba6f7; font-size: 18px; margin-bottom: 20px; }
    .step { background: #1e1e2e; border: 1px solid #313244; border-radius: 8px; padding: 14px; margin-bottom: 12px; }
    .step h2 { font-size: 13px; color: #89dceb; margin: 0 0 8px; }
    .ok  { color: #a6e3a1; }
    .err { color: #f38ba8; }
    .warn { color: #fab387; }
    pre { white-space: pre-wrap; word-break: break-all; font-size: 12px; margin: 4px 0; }
    button { background: #cba6f7; color: #1e1e2e; border: none; padding: 12px 24px; border-radius: 8px;
             font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>🔬 Supabase Raw Fetch Diagnostic</h1>
  <button onclick="runDiag()">▶ Run Full Diagnostic</button>
  <div id="output"></div>

  <script>
    const SUPABASE_URL = 'https://mukccbbpayuyynmlkcia.supabase.co'
    const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11a2NjYmJwYXl1eXlubWxrY2lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NTM1ODQsImV4cCI6MjA5MjEyOTU4NH0.vdv_7r0bZ-QjeHgFnR0QXhtl4OpSek17l0E9MzGrQOc'

    function log(stepId, html) {
      document.getElementById(stepId).innerHTML += html
    }

    function step(id, title) {
      const div = document.createElement('div')
      div.className = 'step'
      div.innerHTML = `<h2>${title}</h2><div id="${id}"></div>`
      document.getElementById('output').appendChild(div)
    }

    async function fetchWithTimeout(url, opts, ms = 8000) {
      const ctrl = new AbortController()
      const t = setTimeout(() => ctrl.abort(), ms)
      try {
        const r = await fetch(url, { ...opts, signal: ctrl.signal })
        clearTimeout(t)
        return r
      } catch(e) {
        clearTimeout(t)
        throw e
      }
    }

    async function runDiag() {
      document.getElementById('output').innerHTML = ''

      // Step 1: Config
      step('s1', '1. Config check')
      log('s1', `<pre class="ok">URL: ${SUPABASE_URL}\nKEY: ${ANON_KEY.slice(0,30)}...\nKEY length: ${ANON_KEY.length} chars</pre>`)

      // Step 2: Service Worker
      step('s2', '2. Service Worker state')
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations()
        if (regs.length === 0) {
          log('s2', `<pre class="ok">✅ No active service workers (correct)</pre>`)
        } else {
          log('s2', `<pre class="warn">⚠️ ${regs.length} SW still registered: ${regs.map(r=>r.scope).join(', ')}</pre>`)
          for (const r of regs) await r.unregister()
          log('s2', `<pre class="ok">→ Unregistered. Reload page then run again.</pre>`)
        }
      } else {
        log('s2', `<pre class="ok">SW not supported in this browser</pre>`)
      }

      // Step 3: Raw GET to REST root
      step('s3', '3. Raw GET /rest/v1/ (no auth)')
      try {
        const r = await fetchWithTimeout(`${SUPABASE_URL}/rest/v1/`, {
          headers: { 'apikey': ANON_KEY }
        })
        const body = await r.text()
        log('s3', `<pre class="${r.ok ? 'ok' : 'warn'}">HTTP ${r.status} ${r.statusText}\n${body.slice(0,200)}</pre>`)
      } catch(e) {
        log('s3', `<pre class="err">❌ FAILED: ${e.name}: ${e.message}</pre>`)
      }

      // Step 4: GET budget_entries with session token
      step('s4', '4. GET budget_entries (with session token)')
      let userToken = ANON_KEY
      try {
        const raw = localStorage.getItem('sb-mukccbbpayuyynmlkcia-auth-token')
        const parsed = raw ? JSON.parse(raw) : null
        if (parsed?.access_token) { userToken = parsed.access_token; log('s4', `<pre class="ok">✅ Session token found in localStorage</pre>`) }
        else log('s4', `<pre class="warn">⚠️ No session token — using anon key (RLS will block)</pre>`)
      } catch(e) { log('s4', `<pre class="warn">localStorage error: ${e.message}</pre>`) }

      try {
        const r = await fetchWithTimeout(`${SUPABASE_URL}/rest/v1/budget_entries?select=id&limit=1`, {
          headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${userToken}` }
        })
        const body = await r.text()
        log('s4', `<pre class="${r.ok ? 'ok' : 'warn'}">HTTP ${r.status}\n${body.slice(0,300)}</pre>`)
      } catch(e) {
        log('s4', `<pre class="err">❌ FAILED: ${e.name}: ${e.message}</pre>`)
      }

      // Step 5: POST (INSERT) budget_entries
      step('s5', '5. POST budget_entries (INSERT test)')
      try {
        const userId = (() => { try { return JSON.parse(localStorage.getItem('sb-mukccbbpayuyynmlkcia-auth-token'))?.user?.id } catch(_) { return null } })()
        if (!userId) { log('s5', `<pre class="warn">⚠️ No user ID found — skipping insert (need to be logged in)</pre>`); return }
        log('s5', `<pre>userId: ${userId}</pre>`)
        const r = await fetchWithTimeout(`${SUPABASE_URL}/rest/v1/budget_entries`, {
          method: 'POST',
          headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${userToken}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify({ user_id: userId, month_year: '2026-05', type: 'income', label: 'DIAG TEST', amount: 1, category: null })
        })
        const body = await r.text()
        log('s5', `<pre class="${r.ok ? 'ok' : 'err'}">HTTP ${r.status} ${r.statusText}\n${body || '(empty body = success)'}</pre>`)
        if (r.ok) log('s5', `<pre class="ok">✅ INSERT WORKED! Budget save is fixed.</pre>`)
      } catch(e) {
        log('s5', `<pre class="err">❌ FAILED: ${e.name}: ${e.message}</pre>`)
      }
    }
  </script>
</body>
</html>
