<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase Diagnostic</title>
  <style>
    body { font-family: monospace; background: #0f0f1a; color: #cdd6f4; padding: 16px; margin: 0; font-size: 13px; }
    h1  { color: #cba6f7; font-size: 17px; margin: 0 0 16px; }
    .card { background: #1e1e2e; border: 1px solid #313244; border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; }
    .card h2 { font-size: 12px; color: #89dceb; margin: 0 0 6px; letter-spacing: .04em; }
    pre { white-space: pre-wrap; word-break: break-all; margin: 0; line-height: 1.6; }
    .ok   { color: #a6e3a1; }
    .err  { color: #f38ba8; }
    .warn { color: #fab387; }
    .info { color: #89b4fa; }
    button { background: #cba6f7; color: #1e1e2e; border: none; padding: 14px; border-radius: 8px;
             font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 14px; }
  </style>
</head>
<body>
  <h1>🔬 Supabase Diagnostic</h1>
  <p style="color:#6c7086;font-size:12px;margin:0 0 14px">No service worker. No React. Raw browser fetch only.</p>

  <!-- FORCE RESET: clears all auth state + reloads to /login -->
  <button onclick="forceReset()" style="background:#f38ba8;margin-bottom:8px">🔴 Force Reset App (clears all auth + reloads)</button>
  <button onclick="runDiag()">▶ Run Full Diagnostic</button>
  <div id="out"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) { regs.forEach(function (r) { r.unregister() }) })
    }

    // ── Force Reset: clears all auth/session state and redirects to /login ────
    async function forceReset() {
      const confirmed = window.confirm('This will clear all auth state (localStorage + sessionStorage) and redirect to /login. Continue?')
      if (!confirmed) return
      // Unregister service workers
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations()
        for (const r of regs) await r.unregister()
      }
      // Clear all Supabase auth keys
      Object.keys(localStorage)
        .filter(k => k.startsWith('sb-') && k.endsWith('-auth-token'))
        .forEach(k => localStorage.removeItem(k))
      localStorage.removeItem('sh_onboarding_done')
      sessionStorage.clear()
      window.location.href = '/login'
    }

    // ── Hardcoded credentials (same as src/lib/supabase-config.js fallbacks) ──
    const SUPABASE_URL  = 'https://mukccbbpayuyynmlkcia.supabase.co'
    const ANON_KEY      = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11a2NjYmJwYXl1eXlubWxrY2lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NTM1ODQsImV4cCI6MjA5MjEyOTU4NH0.vdv_7r0bZ-QjeHgFnR0QXhtl4OpSek17l0E9MzGrQOc'

    // ── Note: this page cannot read import.meta.env — it's not a Vite module.
    // The app uses hardcoded fallbacks in supabase-config.js so env vars are not needed.

    function card(id, title) {
      const d = document.createElement('div')
      d.className = 'card'
      d.innerHTML = `<h2>${title}</h2><pre id="${id}"></pre>`
      document.getElementById('out').appendChild(d)
    }
    function w(id, cls, text) {
      const el = document.getElementById(id)
      if (el) el.innerHTML += `<span class="${cls}">${text}\n</span>`
    }

    async function ft(url, opts, ms = 9000) {
      const c = new AbortController()
      const t = setTimeout(() => c.abort(), ms)
      try { const r = await fetch(url, { ...opts, signal: c.signal }); clearTimeout(t); return r }
      catch(e) { clearTimeout(t); throw e }
    }

    async function runDiag() {
      document.getElementById('out').innerHTML = ''

      // ── 1. Config ──────────────────────────────────────────────────────────
      card('c1', '1 · Config (matches user request)')
      w('c1','ok',`SUPABASE URL:  ${SUPABASE_URL}`)
      w('c1','ok',`HAS KEY:       ${!!ANON_KEY}`)
      w('c1','info',`KEY START:     ${ANON_KEY.slice(0,20)}...`)
      w('c1','info',`KEY LENGTH:    ${ANON_KEY.length} chars`)

      // ── 2. Service Worker state ────────────────────────────────────────────
      card('c2', '2 · Service Worker state')
      if (!('serviceWorker' in navigator)) {
        w('c2','ok','SW not supported — no interception possible')
      } else {
        const regs = await navigator.serviceWorker.getRegistrations()
        if (regs.length === 0) {
          w('c2','ok','✅ 0 service workers registered — SW cannot intercept anything')
        } else {
          w('c2','warn',`⚠️  ${regs.length} SW still active: ${regs.map(r=>r.scope).join(', ')}`)
          for (const r of regs) await r.unregister()
          w('c2','warn','→ Unregistered now. Reload page then re-run.')
        }
      }

      // ── 3. Raw GET /rest/v1/ ───────────────────────────────────────────────
      card('c3', '3 · Raw GET /rest/v1/ (anon key only)')
      w('c3','info','→ fetch ' + SUPABASE_URL + '/rest/v1/')
      w('c3','info','401 + "service_role only" here is NORMAL (root endpoint); it still proves TLS + routing work.')
      try {
        const r = await ft(`${SUPABASE_URL}/rest/v1/`, {
          method: 'GET',
          headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${ANON_KEY}` }
        })
        const body = await r.text()
        w('c3', r.ok ? 'ok' : 'warn', `REST STATUS: ${r.status} ${r.statusText}`)
        w('c3','info',`REST BODY:   ${body.slice(0,200)}`)
        if (r.status === 200 || r.status === 401) w('c3','ok','✅ Supabase REST host responded — browser/network path is alive')
      } catch(e) {
        w('c3','err',`❌ GET FAILED: ${e.name}: ${e.message}`)
        if (e.name === 'AbortError') w('c3','err','→ Request timed out after 9s — likely a network/VPN/firewall block')
        else w('c3','err','→ Could be CORS, DNS, or network block')
      }

      // ── 4. GET budget_entries with session JWT ─────────────────────────────
      card('c4', '4 · GET budget_entries (session token from localStorage)')
      let userToken = ANON_KEY, userId = null
      try {
        const raw = localStorage.getItem('sb-mukccbbpayuyynmlkcia-auth-token')
        const p = raw ? JSON.parse(raw) : null
        if (p?.access_token) {
          userToken = p.access_token
          userId = p.user?.id
          w('c4','ok',`✅ Session token found — userId: ${userId}`)
        } else {
          w('c4','warn','⚠️  No session in localStorage — log in at / first, then re-run')
        }
      } catch(e) { w('c4','err','localStorage read error: ' + e.message) }

      try {
        const r = await ft(`${SUPABASE_URL}/rest/v1/budget_entries?select=id&limit=1`, {
          headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${userToken}` }
        })
        const body = await r.text()
        w('c4', r.ok ? 'ok' : 'warn', `HTTP ${r.status}: ${body.slice(0,200)}`)
      } catch(e) {
        w('c4','err',`❌ FAILED: ${e.name}: ${e.message}`)
      }

      // ── 5. POST INSERT test ────────────────────────────────────────────────
      card('c5', '5 · Raw POST INSERT into budget_entries')
      if (!userId) {
        w('c5','warn','⚠️  Skipped — no session (log in first, then re-run)')
      } else {
        try {
          const body = JSON.stringify({ user_id: userId, month_year: '2026-05', type: 'income', label: 'DIAG TEST — safe to delete', amount: 1, category: null })
          const r = await ft(`${SUPABASE_URL}/rest/v1/budget_entries`, {
            method: 'POST',
            headers: { 'apikey': ANON_KEY, 'Authorization': `Bearer ${userToken}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
            body
          })
          const rb = await r.text()
          w('c5', r.ok ? 'ok' : 'err', `HTTP ${r.status} ${r.statusText}`)
          w('c5','info', rb || '(empty body = success)')
          if (r.ok) w('c5','ok','✅ INSERT WORKED — budget save path is OK')
          else if (/JWT expired|PGRST303/i.test(rb)) w('c5','err','❌ Session JWT expired — sign out & sign in again (not necessarily RLS)')
          else if (/row-level security|RLS/i.test(rb)) w('c5','err','❌ May be RLS — check policies in Supabase')
          else w('c5','err','❌ INSERT REJECTED — read body JSON (JWT vs RLS vs validation)')
        } catch(e) {
          w('c5','err',`❌ FAILED: ${e.name}: ${e.message}`)
          if (e.name === 'AbortError') w('c5','err','→ Timed out — network/VPN/firewall blocking Supabase POST')
        }
      }

      // ── 6. Summary ────────────────────────────────────────────────────────
      card('c6', '6 · Next steps')
      w('c6','info','If step 3 fails:  problem is network/VPN/firewall — try different WiFi or mobile data')
      w('c6','info','If step 4/5 shows JWT expired: re-login — app now refreshes session on load & tab focus')
      w('c6','info','If step 5 rejects with RLS wording: adjust policies — not an SW/network issue')
      w('c6','info','Production app intentionally has no service worker (see index.html)')
    }
  </script>
</body>
</html>
