<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UX Planner — Structure Your UX Thinking</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: #e4e2dc;
      --accent: #4f46e5;
      --accent-light: #eef2ff;
      --accent-hover: #4338ca;
      --text: #1a1917;
      --muted: #6b6860;
      --success: #16a34a;
      --step-done: #d1fae5;
      --radius: 12px;
      --shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 72px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 680px;
      margin-bottom: 40px;
      text-align: center;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    header h1 {
      font-size: clamp(24px, 5vw, 34px);
      font-weight: 700;
      letter-spacing: -.02em;
      line-height: 1.2;
    }
    header p {
      margin-top: 10px;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.65;
      max-width: 480px;
      margin-inline: auto;
    }

    /* ── Progress ── */
    .progress-wrap { width: 100%; max-width: 680px; margin-bottom: 28px; }
    .progress-steps { display: flex; align-items: flex-start; }
    .step-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
    }
    .step-item:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 13px;
      left: 50%;
      width: 100%;
      height: 2px;
      background: var(--border);
      z-index: 0;
      transition: background .35s;
    }
    .step-item.done:not(:last-child)::after { background: var(--accent); }
    .step-dot {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--border);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      z-index: 1;
      position: relative;
      transition: all .3s;
    }
    .step-item.active .step-dot {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 0 0 4px var(--accent-light);
    }
    .step-item.done .step-dot {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }
    .step-label {
      margin-top: 5px;
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      text-align: center;
    }
    .step-item.active .step-label { color: var(--accent); font-weight: 700; }
    .step-item.done .step-label { color: var(--success); }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 40px 32px;
    }
    @media (max-width: 520px) { .card { padding: 28px 20px 24px; } }

    .card-eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .card h2 {
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -.015em;
      margin-bottom: 6px;
    }
    .card-hint {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 28px;
    }

    /* ── Form ── */
    .field { margin-bottom: 20px; }
    .field:last-of-type { margin-bottom: 0; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .opt { font-weight: 400; color: var(--muted); }

    input[type="text"], textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      resize: vertical;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    input[type="text"]::placeholder,
    textarea::placeholder { color: #b5b0a8; }
    input[type="text"]:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
      background: #fff;
    }

    .error-msg { font-size: 12px; color: #ef4444; margin-top: 4px; display: none; }
    .field.has-error input,
    .field.has-error textarea { border-color: #ef4444; }
    .field.has-error .error-msg { display: block; }

    /* ── Chip ── */
    .chip {
      display: inline-block;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 99px;
    }

    /* ── Journey ── */
    .journey-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
    .journey-row { display: grid; grid-template-columns: 26px 1fr auto; align-items: center; gap: 10px; }
    .journey-num {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-remove {
      background: none; border: none; cursor: pointer;
      color: #c9c5be; padding: 4px; border-radius: 4px;
      display: flex; align-items: center;
      transition: color .15s;
    }
    .btn-remove:hover { color: #ef4444; }
    .btn-add-step {
      background: none;
      border: 1.5px dashed var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      width: 100%;
      text-align: center;
      transition: border-color .2s, color .2s;
      font-family: inherit;
    }
    .btn-add-step:hover { border-color: var(--accent); color: var(--accent); }
    .journey-error { font-size: 12px; color: #ef4444; margin-top: 8px; display: none; }

    /* ── Actions ── */
    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 32px;
      gap: 12px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: background .2s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg); color: var(--text); }
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-outline:hover { background: var(--bg); }

    /* ── Summary ── */
    .summary-header { text-align: center; margin-bottom: 28px; }
    .checkmark-ring {
      width: 52px; height: 52px;
      background: var(--step-done);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
    }
    .summary-header h2 { font-size: 24px; font-weight: 700; letter-spacing: -.01em; }
    .summary-header p { color: var(--muted); font-size: 14px; margin-top: 5px; }

    .summary-section {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .summary-sec-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .s-icon {
      width: 30px; height: 30px;
      border-radius: 7px;
      background: var(--accent-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: var(--accent);
    }
    .summary-sec-title { font-size: 13px; font-weight: 700; }
    .summary-sec-body { padding: 16px 18px; }

    .sf { margin-bottom: 12px; }
    .sf:last-child { margin-bottom: 0; }
    .sf-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .sf-value { font-size: 14px; line-height: 1.65; }

    .journey-summary {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .journey-summary li { display: flex; gap: 10px; align-items: flex-start; }
    .j-badge {
      min-width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .j-text { font-size: 14px; line-height: 1.65; }

    .summary-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    /* ── Animations ── */
    .fade-in { animation: fadeUp .28s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Print ── */
    @media print {
      body { background: #fff; padding: 0; }
      .card { box-shadow: none; border: none; max-width: 100%; }
      .summary-actions, header, .progress-wrap { display: none !important; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
    UX Planner
  </div>
  <h1>Structure your UX thinking</h1>
  <p>Answer a few focused questions and walk away with a clean UX project plan — no design experience required.</p>
</header>

<div class="progress-wrap hidden" id="progressWrap">
  <div class="progress-steps" id="progressSteps"></div>
</div>

<div id="app"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const S = {
  idea: '',
  problemWho: '', problemWhat: '', problemWhy: '',
  userPersona: '', userGoals: '', userPains: '',
  journeySteps: ['', '', ''],
};

const STEPS = ['Idea', 'Problem', 'User', 'Journey', 'Summary'];
let cur = 0;

// ─── Progress ─────────────────────────────────────────────────────────────────
function renderProgress() {
  const wrap = document.getElementById('progressWrap');
  const el = document.getElementById('progressSteps');
  if (cur === 4) { wrap.classList.add('hidden'); return; }
  wrap.classList.remove('hidden');
  el.innerHTML = STEPS.map((label, i) => {
    const cls = i < cur ? 'done' : i === cur ? 'active' : '';
    const inner = i < cur
      ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
      : i + 1;
    return `<div class="step-item ${cls}">
      <div class="step-dot">${inner}</div>
      <span class="step-label">${label}</span>
    </div>`;
  }).join('');
}

// ─── Navigate ─────────────────────────────────────────────────────────────────
function goTo(idx) {
  cur = idx;
  renderProgress();
  const app = document.getElementById('app');
  app.innerHTML = '';
  const card = buildStep(idx);
  card.classList.add('fade-in');
  app.appendChild(card);
}

function next() { if (validate(cur)) goTo(cur + 1); }
function back() { goTo(cur - 1); }

// ─── Validation ──────────────────────────────────────────────────────────────
function validate(idx) {
  if (idx === 0) return req('idea', S.idea);
  if (idx === 1) {
    const a = req('problemWho', S.problemWho);
    const b = req('problemWhat', S.problemWhat);
    return a && b;
  }
  if (idx === 2) return req('userPersona', S.userPersona);
  if (idx === 3) {
    const ok = S.journeySteps.filter(s => s.trim()).length >= 2;
    const err = document.querySelector('.journey-error');
    if (err) err.style.display = ok ? 'none' : 'block';
    return ok;
  }
  return true;
}

function req(key, val) {
  const field = document.querySelector(`[data-field="${key}"]`);
  if (!field) return true;
  const empty = !val || !val.trim();
  field.classList.toggle('has-error', empty);
  return !empty;
}

function bind(inputEl, key) {
  inputEl.addEventListener('input', () => {
    S[key] = inputEl.value;
    const f = inputEl.closest('[data-field]');
    if (f && inputEl.value.trim()) f.classList.remove('has-error');
  });
}

// ─── Steps ────────────────────────────────────────────────────────────────────
function buildStep(idx) {
  return [stepIdea, stepProblem, stepUser, stepJourney, stepSummary][idx]();
}

// Step 0 ── Project Idea
function stepIdea() {
  const card = div('card');
  card.innerHTML = `
    <div class="card-eyebrow">Step 1 of 4</div>
    <h2>What's your project idea?</h2>
    <p class="card-hint">Give it a name or describe it in a sentence. Keep it short — you'll flesh it out in the next steps.</p>
    <div class="field" data-field="idea">
      <label for="inp-idea">Project name or idea</label>
      <input id="inp-idea" type="text" placeholder="e.g. YouTube redesign, a meal planning app, a banking super-app…" maxlength="140" value="${x(S.idea)}" />
      <p class="error-msg">Please enter your project idea to continue.</p>
    </div>
    <div class="actions">
      <span></span>
      <button class="btn btn-primary" id="btnNext">
        Continue ${arrow()}
      </button>
    </div>`;
  bind(card.querySelector('#inp-idea'), 'idea');
  card.querySelector('#btnNext').onclick = next;
  card.querySelector('#inp-idea').addEventListener('keydown', e => { if (e.key === 'Enter') next(); });
  return card;
}

// Step 1 ── Problem Statement
function stepProblem() {
  const card = div('card');
  card.innerHTML = `
    <div class="card-eyebrow">Step 2 of 4</div>
    <h2>Define the problem</h2>
    <p class="card-hint">Good design solves a real problem. Use these prompts to form a clear problem statement for <span class="chip">${x(S.idea)}</span>.</p>
    <div class="field" data-field="problemWho">
      <label for="p-who">Who has this problem?</label>
      <input id="p-who" type="text" placeholder="e.g. Casual YouTube viewers who binge-watch in the evenings" value="${x(S.problemWho)}" />
      <p class="error-msg">Describe who faces this problem.</p>
    </div>
    <div class="field" data-field="problemWhat">
      <label for="p-what">What is the problem they face?</label>
      <textarea id="p-what" rows="3" placeholder="e.g. They struggle to discover new videos outside their recommendation bubble and often feel overwhelmed by irrelevant content.">${x(S.problemWhat)}</textarea>
      <p class="error-msg">Describe the core problem.</p>
    </div>
    <div class="field" data-field="problemWhy">
      <label for="p-why">Why does it matter? <span class="opt">(optional)</span></label>
      <input id="p-why" type="text" placeholder="e.g. It leads to wasted time and a frustrating experience" value="${x(S.problemWhy)}" />
    </div>
    <div class="actions">
      <button class="btn btn-secondary" id="btnBack">${arrowLeft()} Back</button>
      <button class="btn btn-primary" id="btnNext">Continue ${arrow()}</button>
    </div>`;
  bind(card.querySelector('#p-who'), 'problemWho');
  bind(card.querySelector('#p-what'), 'problemWhat');
  bind(card.querySelector('#p-why'), 'problemWhy');
  card.querySelector('#btnBack').onclick = back;
  card.querySelector('#btnNext').onclick = next;
  return card;
}

// Step 2 ── Target User
function stepUser() {
  const card = div('card');
  card.innerHTML = `
    <div class="card-eyebrow">Step 3 of 4</div>
    <h2>Who is your target user?</h2>
    <p class="card-hint">Build a simple user profile. This keeps your design decisions grounded in real people, not assumptions.</p>
    <div class="field" data-field="userPersona">
      <label for="u-persona">Describe your typical user in one sentence</label>
      <input id="u-persona" type="text" placeholder="e.g. A 25–35 year old professional who watches YouTube to unwind after work" value="${x(S.userPersona)}" />
      <p class="error-msg">Describe your target user.</p>
    </div>
    <div class="field" data-field="userGoals">
      <label for="u-goals">What are their main goals? <span class="opt">(optional)</span></label>
      <textarea id="u-goals" rows="2" placeholder="e.g. Find entertaining videos quickly, discover new creators, avoid decision fatigue">${x(S.userGoals)}</textarea>
    </div>
    <div class="field" data-field="userPains">
      <label for="u-pains">What frustrates them? <span class="opt">(optional)</span></label>
      <textarea id="u-pains" rows="2" placeholder="e.g. Too many ads, irrelevant recommendations, hard to re-find saved videos">${x(S.userPains)}</textarea>
    </div>
    <div class="actions">
      <button class="btn btn-secondary" id="btnBack">${arrowLeft()} Back</button>
      <button class="btn btn-primary" id="btnNext">Continue ${arrow()}</button>
    </div>`;
  bind(card.querySelector('#u-persona'), 'userPersona');
  bind(card.querySelector('#u-goals'), 'userGoals');
  bind(card.querySelector('#u-pains'), 'userPains');
  card.querySelector('#btnBack').onclick = back;
  card.querySelector('#btnNext').onclick = next;
  return card;
}

// Step 3 ── User Journey
function stepJourney() {
  const card = div('card');
  card.innerHTML = `
    <div class="card-eyebrow">Step 4 of 4</div>
    <h2>Map a basic user journey</h2>
    <p class="card-hint">List the key steps a user takes — from first encountering your product to achieving their goal. Keep each step short and action-oriented.</p>
    <div class="journey-list" id="jList"></div>
    <button class="btn-add-step" id="btnAdd">+ Add a step</button>
    <p class="journey-error">Please fill in at least 2 journey steps.</p>
    <div class="actions" style="margin-top:28px;">
      <button class="btn btn-secondary" id="btnBack">${arrowLeft()} Back</button>
      <button class="btn btn-primary" id="btnNext">See my plan ${arrow()}</button>
    </div>`;

  const list = card.querySelector('#jList');
  renderJList(list);
  card.querySelector('#btnAdd').onclick = () => {
    S.journeySteps.push('');
    renderJList(list);
    list.querySelectorAll('input').item(list.querySelectorAll('input').length - 1)?.focus();
  };
  card.querySelector('#btnBack').onclick = back;
  card.querySelector('#btnNext').onclick = next;
  return card;
}

function renderJList(container) {
  container.innerHTML = '';
  const hints = [
    'e.g. User discovers the product through a friend or ad',
    'e.g. User opens the app and browses available options',
    'e.g. User picks something and engages with the content',
    'e.g. User saves, shares, or completes an action',
    'e.g. User achieves their goal and feels satisfied',
  ];
  S.journeySteps.forEach((val, i) => {
    const row = document.createElement('div');
    row.className = 'journey-row';
    row.innerHTML = `
      <div class="journey-num">${i + 1}</div>
      <input type="text" placeholder="${hints[i] || `Step ${i + 1}`}" value="${x(val)}" data-idx="${i}" />
      ${S.journeySteps.length > 2
        ? `<button class="btn-remove" data-idx="${i}" title="Remove step">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
           </button>`
        : '<span></span>'}`;
    container.appendChild(row);
  });
  container.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', () => {
      S.journeySteps[+inp.dataset.idx] = inp.value;
      const err = document.querySelector('.journey-error');
      if (err && S.journeySteps.filter(s => s.trim()).length >= 2) err.style.display = 'none';
    });
  });
  container.querySelectorAll('.btn-remove').forEach(btn => {
    btn.onclick = () => {
      S.journeySteps.splice(+btn.dataset.idx, 1);
      renderJList(container);
    };
  });
}

// Step 4 ── Summary
function stepSummary() {
  const filled = S.journeySteps.filter(s => s.trim());
  const ps = buildPS();
  const card = div('card');

  card.innerHTML = `
    <div class="summary-header">
      <div class="checkmark-ring">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <h2>Your UX Project Plan</h2>
      <p>Here's everything you've defined for <strong>${x(S.idea)}</strong>.</p>
    </div>

    <div class="summary-section">
      <div class="summary-sec-head">
        <div class="s-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <span class="summary-sec-title">Problem Statement</span>
      </div>
      <div class="summary-sec-body">
        <div class="sf">
          <div class="sf-label">Statement</div>
          <div class="sf-value">${x(ps)}</div>
        </div>
        ${S.problemWhy ? `<div class="sf">
          <div class="sf-label">Why it matters</div>
          <div class="sf-value">${x(S.problemWhy)}</div>
        </div>` : ''}
      </div>
    </div>

    <div class="summary-section">
      <div class="summary-sec-head">
        <div class="s-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <span class="summary-sec-title">Target User</span>
      </div>
      <div class="summary-sec-body">
        <div class="sf">
          <div class="sf-label">Who they are</div>
          <div class="sf-value">${x(S.userPersona)}</div>
        </div>
        ${S.userGoals ? `<div class="sf"><div class="sf-label">Their goals</div><div class="sf-value">${x(S.userGoals)}</div></div>` : ''}
        ${S.userPains ? `<div class="sf"><div class="sf-label">Their frustrations</div><div class="sf-value">${x(S.userPains)}</div></div>` : ''}
      </div>
    </div>

    <div class="summary-section">
      <div class="summary-sec-head">
        <div class="s-icon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <span class="summary-sec-title">User Journey</span>
      </div>
      <div class="summary-sec-body">
        <ul class="journey-summary">
          ${filled.map((s, i) => `<li>
            <span class="j-badge">${i + 1}</span>
            <span class="j-text">${x(s)}</span>
          </li>`).join('')}
        </ul>
      </div>
    </div>

    <div class="summary-actions">
      <button class="btn btn-outline" id="btnPrint">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print / Save PDF
      </button>
      <button class="btn btn-secondary" id="btnCopy">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span id="copyLbl">Copy as text</span>
      </button>
      <button class="btn btn-secondary" id="btnRestart">Start over</button>
    </div>`;

  card.querySelector('#btnPrint').onclick = () => window.print();
  card.querySelector('#btnCopy').onclick = () => {
    navigator.clipboard.writeText(toPlainText(filled, ps)).then(() => {
      const lbl = card.querySelector('#copyLbl');
      lbl.textContent = 'Copied!';
      setTimeout(() => lbl.textContent = 'Copy as text', 2200);
    });
  };
  card.querySelector('#btnRestart').onclick = () => {
    if (!confirm('Start over? All your answers will be cleared.')) return;
    Object.assign(S, {
      idea: '', problemWho: '', problemWhat: '', problemWhy: '',
      userPersona: '', userGoals: '', userPains: '',
      journeySteps: ['', '', ''],
    });
    goTo(0);
  };
  return card;
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function div(cls) { const e = document.createElement('div'); e.className = cls; return e; }
function x(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function arrow() {
  return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;
}
function arrowLeft() {
  return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>`;
}
function buildPS() {
  const who = S.problemWho.trim(), what = S.problemWhat.trim();
  if (!who && !what) return '';
  if (!who) return what;
  if (!what) return `${who} need a better experience.`;
  const w = what.charAt(0).toLowerCase() + what.slice(1);
  return `${who} struggle because ${w}`;
}
function toPlainText(steps, ps) {
  const lines = [`UX PROJECT PLAN — ${S.idea.toUpperCase()}`, ''];
  lines.push('PROBLEM STATEMENT', ps || '—');
  if (S.problemWhy) lines.push('', `Why it matters: ${S.problemWhy}`);
  lines.push('', 'TARGET USER', S.userPersona || '—');
  if (S.userGoals) lines.push('', `Goals: ${S.userGoals}`);
  if (S.userPains) lines.push('', `Frustrations: ${S.userPains}`);
  lines.push('', 'USER JOURNEY');
  steps.forEach((s, i) => lines.push(`${i + 1}. ${s}`));
  return lines.join('\n');
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
goTo(0);
</script>
</body>
</html>
