<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stewardship Hub</title>
    <meta name="description" content="Faith-based financial freedom — Budget, Invest, Save, Give" />
    <meta name="theme-color" content="#1D9E75" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Stewardship" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- ⚡ Preconnect: browser starts TCP handshake to Supabase BEFORE JS runs -->
    <link rel="preconnect" href="https://mukccbbpayuyynmlkcia.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://mukccbbpayuyynmlkcia.supabase.co" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Apply theme before React mounts to prevent flash of wrong theme -->
    <script>
      (function() {
        var t = localStorage.getItem('sh_theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <!-- Service worker: handles offline fallback for app shell only.
         Supabase requests are bypassed (early return, no event.respondWith). -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('[SW] registered'))
            .catch(err => console.warn('[SW] registration failed:', err))
        })
      }
    </script>
  </body>
</html>
