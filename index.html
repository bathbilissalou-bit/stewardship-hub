<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stewardship Hub</title>
    <meta name="description" content="Faith-based financial freedom — Budget, Invest, Save, Give" />
    <meta name="theme-color" content="#1D9E75" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Stewardship" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- ⚡ Preconnect: browser starts TCP handshake to Supabase BEFORE JS runs -->
    <!-- Saves 200–400 ms on every session start -->
    <link rel="preconnect" href="https://mukccbbpayuyynmlkcia.supabase.co" crossorigin />
    <link rel="dns-prefetch" href="https://mukccbbpayuyynmlkcia.supabase.co" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Apply theme before React mounts to prevent flash of wrong theme -->
    <script>
      (function() {
        var t = localStorage.getItem('sh_theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <!-- SERVICE WORKER TEMPORARILY DISABLED for Supabase connectivity testing -->
    <!-- Re-enable after confirming DB requests work without SW -->
    <!--
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW registered'))
            .catch(err => console.log('SW error:', err))
        })
      }
    </script>
    -->
    <script>
      // Unregister any existing service workers so old SW doesn't intercept requests
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(reg => reg.unregister())
        })
      }
    </script>
  </body>
</html>
